<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Contact page for Blog Post Of Three Cricket Legend">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Contact | Blog Post Of Three Cricket Legend</title>

<body>
    <header>
        <h1>Contact</h1>
        <p><em>Have thoughts on these legends? Get in touch.</em></p>
        <hr>
        <nav>
            <a href="index.html">Home Page</a> |
            <a href="blog.html">Blog Page</a> |
            <a href="contact.html">Contact</a>
        </nav>
        <hr>
    </header>

    <main>
        <section id="contact-form">
            <h2>Send a Message</h2>
            <form action="">
                <label for="name">Full Name:</label>
                <br>
                <input type="text" id="name" name="name" required>
                <br><br>

                <label for="email">Email:</label>
                <br>
                <input type="email" id="email" name="email" placeholder="abc@gmail.com" required>
                <br><br>

                <label for="subject">Subject:</label>
                <br>
                <select id="subject" name="subject">
                    <option value="feedback">Feedback</option>
                    <option value="correction">Correction</option>
                    <option value="general">General Inquiry</option>
                </select>
                <br><br>

                <label for="message">Message:</label>
                <br>
                <textarea id="message" name="message" rows="5" cols="40" placeholder="Write your message here..." required></textarea>
                <br><br>

                <button type="submit">Send Message</button>
            </form>
        </section>

        <hr>

        <section id="contact-info">
            <h2>Other Ways to Reach Me</h2>
            <address>
                <i class="fa-brands fa-github" aria-hidden="true"></i>
                <a href="https://github.com/harshprajapati4042-alt" target="_blank" rel="noopener noreferrer">GitHub</a>
                <br>
                <i class="fa-brands fa-linkedin" aria-hidden="true"></i>
                <a href="https://www.linkedin.com/in/harsh-prajapati-b6194131b/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                <br>
                <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                <a href="mailto:harshprajapati09122006@gmail.com">harshprajapati09122006@gmail.com</a>
            </address>
        </section>
    </main>

</body>

</html>
